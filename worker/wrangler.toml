# Matches index.html: const XAI_PROXY = 'https://voiceflow-proxy.edoardosanti.workers.dev'
name = "voiceflow-proxy"
main = "index.js"
compatibility_date = "2024-11-01"

# Replace id with your existing KV namespace from the Workers dashboard (Settings → Variables → KV)
# Or run: npx wrangler kv namespace list
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
